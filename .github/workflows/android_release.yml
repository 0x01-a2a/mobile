name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-v0.1.0}"
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"    >> "$GITHUB_OUTPUT"

      - name: Download zerox1-node binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p android/app/src/main/assets
          gh release download v0.1.28 \
            --repo 0x01-a2a/node \
            --pattern 'zerox1-node-android-arm64' \
            --output android/app/src/main/assets/zerox1-node
          chmod +x android/app/src/main/assets/zerox1-node

      - name: Download zeroclaw binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v0.1.0 \
            --repo 0x01-a2a/zeroclaw \
            --pattern 'zeroclaw-android-arm64' \
            --output android/app/src/main/assets/zeroclaw
          chmod +x android/app/src/main/assets/zeroclaw

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ZEROX1_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Make Gradlew Executable
        run: chmod +x gradlew
        working-directory: android

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        working-directory: android
        env:
          ZEROX1_RELEASE_STORE_PASS: ${{ secrets.ZEROX1_RELEASE_STORE_PASS }}
          ZEROX1_RELEASE_KEY_PASS:   ${{ secrets.ZEROX1_RELEASE_KEY_PASS }}
          ZEROX1_RELEASE_KEYSTORE:   release.keystore
          VERSION_CODE:              ${{ steps.version.outputs.code }}
          VERSION_NAME:              ${{ steps.version.outputs.name }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
