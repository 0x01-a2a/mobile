name: Android Release Build

# Produces three distribution variants from a single codebase:
#
#   full          — Direct download from website (0x01.world/download)
#                   All permissions enabled: SMS, call log, camera, microphone,
#                   notifications, accessibility, activity recognition, Bluetooth.
#                   Full phone bridge capabilities (messaging/contacts/location/
#                   camera/microphone/calls/screen/calendar/media).
#                   Distributed as APK — no store policy restrictions apply.
#
#   dappstore     — Solana ecosystem app stores (e.g. Solana dApp Store)
#                   Solana dApp Store policy does NOT prohibit notification
#                   listener, accessibility, camera, or microphone — only
#                   illegal activity, malware, and data abuse are banned.
#                   Drops: SMS, call log, call screening (requires default
#                   phone/dialer app), activity recognition, Bluetooth,
#                   package usage stats, OTA installer.
#                   Keeps: camera, microphone, notifications, notification
#                   listener, accessibility, health connect, location, contacts.
#                   Adds: SeedVault integration (Seeker/Saga hardware keys).
#                   Distributed as APK.
#
#   googleplay    — Google Play Store
#                   Removes all sensitive/background permissions that Play Store
#                   rejects without being default SMS/dialer/system app:
#                   SMS, call log, camera, microphone, activity recognition,
#                   Bluetooth, package usage stats, accessibility service,
#                   notification listener, call screening.
#                   Distributed as AAB (required by Play Store).
#
# Capability gating is enforced at two levels:
#   1. AndroidManifest overlay (tools:node="remove") strips permissions/services
#      at build time per flavor (src/<flavor>/AndroidManifest.xml).
#   2. NodeService.kt applyDistributionCapabilityDefaults() sets SharedPreferences
#      bridge_cap_* flags at runtime so ZeroClaw tools respect the same limits.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      node_tag:
        description: 'Node release tag to bundle (e.g. v0.3.3). Defaults to current tag on tag push.'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZEROX1_RELEASE_STORE_PASS:    ${{ secrets.ZEROX1_RELEASE_STORE_PASS }}
      ZEROX1_RELEASE_KEY_PASS:      ${{ secrets.ZEROX1_RELEASE_KEY_PASS }}
      ZEROX1_RELEASE_KEYSTORE:      release.keystore
      ZEROX1_DAPPSTORE_STORE_PASS:  ${{ secrets.ZEROX1_DAPPSTORE_STORE_PASS }}
      ZEROX1_DAPPSTORE_KEY_PASS:    ${{ secrets.ZEROX1_DAPPSTORE_KEY_PASS }}
      ZEROX1_DAPPSTORE_KEYSTORE:    dappstore.keystore
      ZEROX1_BAGS_API_KEY:          ${{ secrets.ZEROX1_BAGS_API_KEY }}
      ZEROX1_BAGS_PARTNER_WALLET:   ${{ secrets.ZEROX1_BAGS_PARTNER_WALLET }}
      ZEROX1_BAGS_PARTNER_KEY:      ${{ secrets.ZEROX1_BAGS_PARTNER_KEY }}
      ZEROX1_JUPITER_API_KEY:       ${{ secrets.ZEROX1_JUPITER_API_KEY }}
      ZEROX1_HELIUS_API_KEY:        ${{ secrets.ZEROX1_HELIUS_API_KEY }}
      ZEROX1_JUPITER_FEE_ACCOUNT:          ${{ secrets.ZEROX1_JUPITER_FEE_ACCOUNT }}
      ZEROX1_LAUNCHLAB_SHARE_FEE_WALLET:   ${{ secrets.ZEROX1_LAUNCHLAB_SHARE_FEE_WALLET }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-v0.1.0}"
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"    >> "$GITHUB_OUTPUT"

      - name: Decode Keystores
        run: |
          echo "${{ secrets.ZEROX1_RELEASE_KEYSTORE_BASE64 }}"   | base64 --decode > android/app/release.keystore
          echo "${{ secrets.ZEROX1_DAPPSTORE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/dappstore.keystore

      - name: Make Gradlew Executable
        run: chmod +x gradlew
        working-directory: android

      # Strip debug symbols from the node binary — built in the node repo CI
      # and committed to jniLibs. The other .so files are already stripped.
      - name: Strip libzerox1_node.so
        run: |
          STRIP="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          "$STRIP" --strip-unneeded android/app/src/main/jniLibs/arm64-v8a/libzerox1_node.so
          ls -lh android/app/src/main/jniLibs/arm64-v8a/

      # ── Full APK ─────────────────────────────────────────────────────────────
      # All permissions + full phone bridge. Direct download, no store review.
      - name: Build Full APK
        run: ./gradlew assembleFullRelease --stacktrace
        working-directory: android
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}

      # ── Solana dApp Store APK ─────────────────────────────────────────────────
      # Camera/mic/notifications/accessibility all kept (dApp Store policy does
      # not prohibit these — only illegal activity, malware, data abuse).
      # Call screening removed (requires being default phone app, unrelated to
      # store policy). APK format (not AAB).
      - name: Build dApp Store APK
        run: ./gradlew assembleDappstoreRelease --stacktrace
        working-directory: android
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}

      # ── Google Play AAB ───────────────────────────────────────────────────────
      # Sensitive background permissions removed (Play Store rejects autonomous
      # SMS/camera/mic/notification/accessibility use without system app status).
      # AAB format required by Play Store for new apps.
      - name: Build Google Play AAB
        run: ./gradlew bundleGoogleplayRelease --stacktrace
        working-directory: android
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}

      # ── Artifacts ─────────────────────────────────────────────────────────────
      - name: Upload Full APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-full-release
          path: android/app/build/outputs/apk/full/release/app-full-release.apk

      - name: Upload dApp Store APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dappstore-release
          path: android/app/build/outputs/apk/dappstore/release/app-dappstore-release.apk

      - name: Upload Google Play AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-googleplay-release
          path: android/app/build/outputs/bundle/googleplayRelease/app-googleplay-release.aab

      # ── GitHub Release ────────────────────────────────────────────────────────
      # Attaches all three variants so users can pick their distribution channel.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/full/release/app-full-release.apk
            android/app/build/outputs/apk/dappstore/release/app-dappstore-release.apk
            android/app/build/outputs/bundle/googleplayRelease/app-googleplay-release.aab
          generate_release_notes: true

      # ── Solana dApp Store publish ─────────────────────────────────────────────
      # Uses @solana-mobile/dapp-store-cli v0.16+ (portal-backed).
      #
      # ONE-TIME MANUAL SETUP (do this once via the portal UI, not CI):
      #   1. Go to https://publish.solanamobile.com
      #   2. Register as a publisher, create the app, upload screenshots/icon
      #   3. Copy your API key from the portal dashboard
      #   4. Add it as GitHub secret: DAPP_STORE_API_KEY
      #
      # After that, every tagged release publishes automatically via this step.
      # The portal decides whether this is a new release or an update.
      - name: Publish to Solana dApp Store
        if: startsWith(github.ref, 'refs/tags/') && env.DAPP_STORE_API_KEY != ''
        env:
          DAPP_STORE_API_KEY: ${{ secrets.DAPP_STORE_API_KEY }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          npx --yes @solana-mobile/dapp-store-cli@latest \
            --apk-file android/app/build/outputs/apk/dappstore/release/app-dappstore-release.apk \
            --whats-new "$(sed -n '/new_in_version/,/saga_features/p' dapp-store/config.yaml | grep -v 'new_in_version\|saga_features' | sed 's/^ *//' | tr -d '\n' | cut -c1-500)"
