apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. Default is "debug", "debugOptimized".
    debuggableVariants = ["fullDebug", "dappstoreDebug", "googleplayDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "world.zerox1.pilot"
    defaultConfig {
        applicationId "world.zerox1.pilot"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode Integer.parseInt(System.getenv("VERSION_CODE") ?: "1")
        versionName System.getenv("VERSION_NAME") ?: "0.7.0"
        buildConfigField "String", "DEFAULT_BAGS_PARTNER_WALLET", "\"${System.getenv("ZEROX1_BAGS_PARTNER_WALLET") ?: ""}\""
        buildConfigField "String", "DEFAULT_BAGS_PARTNER_KEY", "\"${System.getenv("ZEROX1_BAGS_PARTNER_KEY") ?: ""}\""
        buildConfigField "String", "DEFAULT_BAGS_API_KEY", "\"${System.getenv("ZEROX1_BAGS_API_KEY") ?: ""}\""
        buildConfigField "String", "DEFAULT_JUPITER_API_KEY", "\"${System.getenv("ZEROX1_JUPITER_API_KEY") ?: ""}\""
        buildConfigField "String", "HELIUS_API_KEY", "\"${System.getenv("ZEROX1_HELIUS_API_KEY") ?: ""}\""
        buildConfigField "String", "DEFAULT_JUPITER_FEE_ACCOUNT", "\"${System.getenv("ZEROX1_JUPITER_FEE_ACCOUNT") ?: ""}\""
        buildConfigField "String", "DEFAULT_LAUNCHLAB_SHARE_FEE_WALLET", "\"${System.getenv("ZEROX1_LAUNCHLAB_SHARE_FEE_WALLET") ?: ""}\""
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file(System.getenv("ZEROX1_RELEASE_KEYSTORE") ?: "/Users/tobiasd/Desktop/zerox1/secrets/release.keystore")
            storePassword System.getenv("ZEROX1_RELEASE_STORE_PASS") ?: "unset"
            keyAlias 'zerox1-release'
            keyPassword System.getenv("ZEROX1_RELEASE_KEY_PASS") ?: "unset"
        }
        dappstore {
            storeFile file(System.getenv("ZEROX1_DAPPSTORE_KEYSTORE") ?: "/Users/tobiasd/Desktop/zerox1/secrets/dappstore.keystore")
            storePassword System.getenv("ZEROX1_DAPPSTORE_STORE_PASS") ?: "unset"
            keyAlias 'zerox1-dappstore'
            keyPassword System.getenv("ZEROX1_DAPPSTORE_KEY_PASS") ?: "unset"
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    flavorDimensions "distribution"
    productFlavors {
        full {
            dimension "distribution"
            buildConfigField "String",  "DISTRIBUTION",                  '"full"'
            buildConfigField "boolean", "SEED_VAULT_ENABLED",            "false"
            buildConfigField "String",  "POLICY_MODE",                   '"AUTONOMOUS"'
            buildConfigField "boolean", "ALLOW_ACCESSIBILITY_SERVICE",   "true"
            buildConfigField "boolean", "ALLOW_NOTIFICATION_LISTENER",   "true"
            buildConfigField "boolean", "ALLOW_AUTONOMOUS_UI_EXECUTION", "true"
        }
        dappstore {
            dimension "distribution"
            minSdkVersion 26
            signingConfig signingConfigs.dappstore
            buildConfigField "String",  "DISTRIBUTION",                  '"dappstore"'
            buildConfigField "boolean", "SEED_VAULT_ENABLED",            "true"
            buildConfigField "String",  "POLICY_MODE",                   '"CLIENT_ONLY"'
            buildConfigField "boolean", "ALLOW_ACCESSIBILITY_SERVICE",   "true"
            buildConfigField "boolean", "ALLOW_NOTIFICATION_LISTENER",   "true"
            buildConfigField "boolean", "ALLOW_AUTONOMOUS_UI_EXECUTION", "false"
        }
        googleplay {
            dimension "distribution"
            buildConfigField "String",  "DISTRIBUTION",                  '"googleplay"'
            buildConfigField "boolean", "SEED_VAULT_ENABLED",            "false"
            buildConfigField "String",  "POLICY_MODE",                   '"ASSISTED"'
            buildConfigField "boolean", "ALLOW_ACCESSIBILITY_SERVICE",   "false"
            buildConfigField "boolean", "ALLOW_NOTIFICATION_LISTENER",   "false"
            buildConfigField "boolean", "ALLOW_AUTONOMOUS_UI_EXECUTION", "false"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    // Encrypted key-value storage (CRIT-4: LLM API key at rest)
    implementation("androidx.security:security-crypto:1.1.0-alpha06")
    // Ed25519 signing for blob uploads — pure Java, works all API levels
    implementation("net.i2p.crypto:eddsa:0.3.0")
    // Health Connect — reads sleep, HR, HRV, steps, weight from wearables + apps
    implementation("androidx.health.connect:connect-client:1.1.0-rc01")
    // SeedVault — Solana Mobile hardware key derivation (dappstore / Seeker only)
    dappstoreImplementation("com.solanamobile:seedvault-wallet-sdk:0.2.10")
    // WorkManager — background polling for ntfy wake events when NodeService is stopped
    implementation("androidx.work:work-runtime-ktx:2.9.1")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
